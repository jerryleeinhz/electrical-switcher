<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Keithley 3706A-S Switcher</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --panel: #ffffff;
      --ink: #1f2933;
      --muted: #667085;
      --line: #d7dde5;
      --blue: #2563eb;
      --green: #15803d;
      --red: #b42318;
      --amber: #b54708;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "Segoe UI", Arial, sans-serif;
    }
    header {
      align-items: center;
      background: #111827;
      color: white;
      display: flex;
      justify-content: space-between;
      padding: 14px 22px;
    }
    h1 { font-size: 18px; margin: 0; }
    main {
      display: grid;
      gap: 16px;
      grid-template-columns: 320px 1fr;
      margin: 0 auto;
      max-width: 1180px;
      padding: 18px;
    }
    section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
    }
    h2 {
      font-size: 15px;
      margin: 0 0 12px;
    }
    label {
      color: var(--muted);
      display: block;
      font-size: 12px;
      margin: 12px 0 5px;
    }
    input, select {
      border: 1px solid var(--line);
      border-radius: 6px;
      font-size: 14px;
      padding: 9px 10px;
      width: 100%;
    }
    button {
      border: 0;
      border-radius: 6px;
      color: white;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      padding: 9px 12px;
    }
    button:disabled { cursor: not-allowed; opacity: 0.5; }
    .primary { background: var(--blue); }
    .safe { background: var(--green); }
    .danger { background: var(--red); }
    .warn { background: var(--amber); }
    .row { display: flex; gap: 8px; margin-top: 10px; }
    .row > * { flex: 1; }
    .status {
      align-items: center;
      display: flex;
      gap: 8px;
      font-size: 13px;
    }
    .dot {
      background: var(--red);
      border-radius: 50%;
      height: 10px;
      width: 10px;
    }
    .dot.on { background: var(--green); }
    .identity, .log {
      background: #f8fafc;
      border: 1px solid var(--line);
      border-radius: 6px;
      color: var(--muted);
      font-family: Consolas, monospace;
      font-size: 12px;
      margin-top: 12px;
      min-height: 36px;
      padding: 10px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .grid {
      display: grid;
      gap: 8px;
      grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
    }
    .channel {
      background: #fff1f1;
      border: 1px solid #fecaca;
      border-radius: 6px;
      color: var(--red);
      min-height: 48px;
    }
    .channel.closed {
      background: #ecfdf3;
      border-color: #86efac;
      color: var(--green);
    }
    .toolbar {
      align-items: end;
      display: grid;
      gap: 10px;
      grid-template-columns: 120px 1fr auto;
      margin-bottom: 14px;
    }
    @media (max-width: 800px) {
      main { grid-template-columns: 1fr; }
      .toolbar { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Keithley 3706A-S Switcher</h1>
    <div class="status"><span id="dot" class="dot"></span><span id="statusText">Disconnected</span></div>
  </header>

  <main>
    <div>
      <section>
        <h2>Connection</h2>
        <label for="address">GPIB address</label>
        <input id="address" type="number" min="0" max="30" placeholder="18">
        <label for="resource">VISA resource override</label>
        <input id="resource" placeholder="GPIB0::18::INSTR">
        <div class="row">
          <button class="primary" id="connectBtn">Connect</button>
          <button class="danger" id="disconnectBtn">Disconnect</button>
        </div>
        <div id="identity" class="identity"></div>
      </section>

      <section style="margin-top:16px;">
        <h2>Manual Channels</h2>
        <label for="channels">Channels</label>
        <input id="channels" placeholder="1001 or 1001,1002:1004">
        <div class="row">
          <button class="safe" id="closeBtn">Close</button>
          <button class="danger" id="openBtn">Open</button>
        </div>
        <button class="warn" id="openAllBtn" style="margin-top:10px;width:100%;">Open All</button>
      </section>

      <section style="margin-top:16px;">
        <h2>TSP Console</h2>
        <label for="mode">Mode</label>
        <select id="mode">
          <option value="query">Query expression with print(...)</option>
          <option value="write">Write raw command</option>
        </select>
        <label for="command">Command</label>
        <input id="command" placeholder='channel.getclose("allslots")'>
        <button class="primary" id="sendBtn" style="margin-top:10px;width:100%;">Send</button>
        <div id="log" class="log"></div>
      </section>
    </div>

    <section>
      <div class="toolbar">
        <div>
          <label for="slot">Slot</label>
          <select id="slot">
            <option value="1">Slot 1</option>
            <option value="2">Slot 2</option>
            <option value="3">Slot 3</option>
            <option value="4">Slot 4</option>
            <option value="5">Slot 5</option>
            <option value="6">Slot 6</option>
          </select>
        </div>
        <div>
          <label for="count">Channels shown</label>
          <input id="count" type="number" min="1" max="80" value="40">
        </div>
        <button class="primary" id="refreshBtn">Refresh</button>
      </div>
      <div id="closedInfo" class="identity">Connect to view channel state.</div>
      <div id="grid" class="grid" style="margin-top:14px;"></div>
    </section>
  </main>

  <script>
    const state = { connected: false, closed: new Set() };
    const el = id => document.getElementById(id);

    async function api(path, method = "GET", body) {
      const options = { method, headers: { "Content-Type": "application/json" } };
      if (body) options.body = JSON.stringify(body);
      const response = await fetch(path, options);
      const payload = await response.json();
      if (!response.ok || payload.success === false) throw new Error(payload.error || "Request failed");
      return payload;
    }

    function setConnected(connected, identity = "") {
      state.connected = connected;
      el("dot").classList.toggle("on", connected);
      el("statusText").textContent = connected ? "Connected" : "Disconnected";
      el("identity").textContent = identity;
      renderGrid();
    }

    function parseClosed(text) {
      const closed = new Set();
      String(text || "").split(",").map(part => part.trim()).filter(Boolean).forEach(part => {
        if (part.includes(":")) {
          const [start, end] = part.split(":").map(Number);
          for (let channel = start; channel <= end; channel++) closed.add(channel);
        } else {
          const channel = Number(part);
          if (!Number.isNaN(channel)) closed.add(channel);
        }
      });
      state.closed = closed;
    }

    function renderGrid() {
      const grid = el("grid");
      grid.innerHTML = "";
      const slot = Number(el("slot").value);
      const count = Number(el("count").value || 40);
      const base = slot * 1000;
      for (let offset = 1; offset <= count; offset++) {
        const channel = base + offset;
        const closed = state.closed.has(channel);
        const button = document.createElement("button");
        button.className = "channel" + (closed ? " closed" : "");
        button.textContent = channel + "\n" + (closed ? "CLOSED" : "OPEN");
        button.disabled = !state.connected;
        button.onclick = () => toggleChannel(channel, closed);
        grid.appendChild(button);
      }
    }

    async function refresh() {
      const payload = await api("/api/status");
      if (!payload.connected) {
        setConnected(false);
        el("closedInfo").textContent = "Not connected.";
        return;
      }
      parseClosed(payload.closed_channels);
      setConnected(true, payload.identity);
      el("closedInfo").textContent = state.closed.size ? `Closed: ${payload.closed_channels}` : "All channels open.";
    }

    async function toggleChannel(channel, closed) {
      await api(`/api/channels/${closed ? "open" : "close"}`, "POST", { channels: String(channel) });
      await refresh();
    }

    async function connect() {
      const body = {};
      if (el("resource").value.trim()) body.resource = el("resource").value.trim();
      if (el("address").value.trim()) body.address = Number(el("address").value);
      const payload = await api("/api/connect", "POST", body);
      setConnected(true, payload.identity);
      await refresh();
    }

    async function disconnect() {
      await api("/api/disconnect", "POST");
      state.closed.clear();
      setConnected(false);
      el("closedInfo").textContent = "Disconnected.";
    }

    async function channelAction(action) {
      const channels = el("channels").value.trim();
      await api(`/api/channels/${action}`, "POST", { channels });
      await refresh();
    }

    async function openAll() {
      if (!confirm("Open all channels on the connected 3706A-S?")) return;
      await api("/api/channels/openall", "POST");
      await refresh();
    }

    async function sendCommand() {
      const command = el("command").value.trim();
      const mode = el("mode").value;
      const payload = await api("/api/command", "POST", { command, mode });
      el("log").textContent += `> ${mode}: ${command}\n${payload.result || "OK"}\n`;
    }

    function wire(id, handler) {
      el(id).onclick = async () => {
        try { await handler(); }
        catch (error) { el("log").textContent += `ERROR: ${error.message}\n`; }
      };
    }

    wire("connectBtn", connect);
    wire("disconnectBtn", disconnect);
    wire("refreshBtn", refresh);
    wire("closeBtn", () => channelAction("close"));
    wire("openBtn", () => channelAction("open"));
    wire("openAllBtn", openAll);
    wire("sendBtn", sendCommand);
    el("slot").onchange = renderGrid;
    el("count").oninput = renderGrid;
    renderGrid();
  </script>
</body>
</html>
